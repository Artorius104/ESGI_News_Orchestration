name: CI

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src/

      - name: Format (ruff format --check)
        run: uv run ruff format --check src/

      - name: Type check (mypy)
        run: uv run mypy src/mlproject

      - name: Prepare data
        run: PYTHONPATH=src uv run python scripts/prepare_data.py

      - name: Train model (no MLflow, cv=3 pour la vitesse en CI)
        run: PYTHONPATH=src uv run python -m mlproject.train_models --no-mlflow --cv 3

      - name: Tests (pytest)
        run: PYTHONPATH=src uv run pytest

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          retention-days: 7

  cd:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: models

      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}-api' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t "$IMAGE_NAME:smoke" .

      - name: Smoke test container
        run: |
          docker run -d --name api-smoke -p 8000:8000 -v "$PWD/models:/app/models:ro" "$IMAGE_NAME:smoke"
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/health; then
              echo "API healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health
          docker logs api-smoke
          docker rm -f api-smoke

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag "$IMAGE_NAME:smoke" "ghcr.io/$IMAGE_NAME:latest"
          docker tag "$IMAGE_NAME:smoke" "ghcr.io/$IMAGE_NAME:${{ github.sha }}"
          docker push "ghcr.io/$IMAGE_NAME:latest"
          docker push "ghcr.io/$IMAGE_NAME:${{ github.sha }}"
