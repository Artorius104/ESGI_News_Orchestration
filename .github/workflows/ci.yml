name: CI

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src/ frontend/

      - name: Format (ruff format --check)
        run: uv run ruff format --check src/ frontend/

      - name: Type check (mypy)
        run: uv run mypy src/mlproject

      - name: Prepare data
        run: PYTHONPATH=src uv run python scripts/prepare_data.py

      - name: Build training image
        run: docker build -f docker/Dockerfile.train -t mlproject-train:ci .

      - name: Train model in container (MLflow via service container, cv=3 pour la vitesse en CI)
        run: |
          docker network create ci-net
          docker run -d --name mlflow --network ci-net -p 5000:5000 \
            ghcr.io/mlflow/mlflow:v3.13.0 \
            mlflow server --host 0.0.0.0 --port 5000 \
            --backend-store-uri sqlite:////mlflow/mlflow.db \
            --artifacts-destination /mlflow/artifacts --serve-artifacts \
            --allowed-hosts "*"

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/health; then
              echo "MLflow ready"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:5000/health

          mkdir -p models
          docker run --rm --network ci-net \
            -e MLFLOW_TRACKING_URI=http://mlflow:5000 \
            --user "$(id -u):$(id -g)" \
            -v "$PWD/data:/app/data:ro" \
            -v "$PWD/models:/app/models" \
            mlproject-train:ci --cv 3

          docker logs mlflow
          docker rm -f mlflow
          docker network rm ci-net

      - name: Tests (pytest)
        run: PYTHONPATH=src uv run pytest

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: |
            models/model.joblib
            models/model_comparison.json
            models/shap_summary.png
            models/dataset_info.json
            models/confusion_matrix.json
          retention-days: 7

  cd:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: models

      - name: Compute lowercase image names
        run: |
          echo "IMAGE_NAME_API=$(echo '${{ github.repository }}-api' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE_NAME_FRONTEND=$(echo '${{ github.repository }}-frontend' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE_NAME_TRAIN=$(echo '${{ github.repository }}-train' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t "$IMAGE_NAME_API:smoke" .

      - name: Smoke test API container
        run: |
          docker run -d --name api-smoke -p 8000:8000 -v "$PWD/models:/app/models:ro" "$IMAGE_NAME_API:smoke"
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/health; then
              echo "API healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health
          curl -sf http://127.0.0.1:8000/models
          curl -sf http://127.0.0.1:8000/dataset-info
          curl -sf http://127.0.0.1:8000/confusion-matrix
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/shap-summary
          docker logs api-smoke
          docker rm -f api-smoke

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t "$IMAGE_NAME_FRONTEND:smoke" .

      - name: Smoke test frontend container
        run: |
          docker run -d --name frontend-smoke -p 8501:8501 "$IMAGE_NAME_FRONTEND:smoke"
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8501/_stcore/health; then
              echo "Frontend healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8501/_stcore/health
          docker logs frontend-smoke
          docker rm -f frontend-smoke

      - name: Build training image
        run: docker build -f docker/Dockerfile.train -t "$IMAGE_NAME_TRAIN:smoke" .

      - name: Smoke test training image
        run: docker run --rm "$IMAGE_NAME_TRAIN:smoke" --help

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push images
        run: |
          docker tag "$IMAGE_NAME_API:smoke" "ghcr.io/$IMAGE_NAME_API:latest"
          docker tag "$IMAGE_NAME_API:smoke" "ghcr.io/$IMAGE_NAME_API:${{ github.sha }}"
          docker push "ghcr.io/$IMAGE_NAME_API:latest"
          docker push "ghcr.io/$IMAGE_NAME_API:${{ github.sha }}"

          docker tag "$IMAGE_NAME_FRONTEND:smoke" "ghcr.io/$IMAGE_NAME_FRONTEND:latest"
          docker tag "$IMAGE_NAME_FRONTEND:smoke" "ghcr.io/$IMAGE_NAME_FRONTEND:${{ github.sha }}"
          docker push "ghcr.io/$IMAGE_NAME_FRONTEND:latest"
          docker push "ghcr.io/$IMAGE_NAME_FRONTEND:${{ github.sha }}"

          docker tag "$IMAGE_NAME_TRAIN:smoke" "ghcr.io/$IMAGE_NAME_TRAIN:latest"
          docker tag "$IMAGE_NAME_TRAIN:smoke" "ghcr.io/$IMAGE_NAME_TRAIN:${{ github.sha }}"
          docker push "ghcr.io/$IMAGE_NAME_TRAIN:latest"
          docker push "ghcr.io/$IMAGE_NAME_TRAIN:${{ github.sha }}"
